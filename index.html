<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuesioner ANP — Pemeliharaan Jalan</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --bg:#EEF4F7;
    --paper:#FFFFFF;
    --ink:#1A2530;
    --navy:#1B3A5C;
    --navy-2:#254E7A;
    --navy-3:#0F2540;
    --teal:#1A9E8F;
    --teal-dark:#127A6E;
    --teal-light:#E6F7F5;
    --line:#C8DBE8;
    --muted:#5A7080;
    --good:#1A9E8F;
    --danger:#C0392B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background-color:var(--bg);
    background-image:
      radial-gradient(circle at 15% 25%, rgba(26,158,143,.10) 0%, transparent 45%),
      radial-gradient(circle at 85% 70%, rgba(27,58,92,.13) 0%, transparent 45%),
      radial-gradient(circle at 50% 95%, rgba(26,158,143,.07) 0%, transparent 40%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231B3A5C' fill-opacity='0.045'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.disp{
    font-family:'Oswald',system-ui,sans-serif;
    text-transform:uppercase;
    letter-spacing:.03em;
  }
  #app{max-width:1140px;margin:0 auto;padding:0 0 60px;}

  /* ── LAYOUT SATU KOLOM PERTANYAAN (desktop & mobile, urutan tetap) ── */
  .qlist{
    display:flex;
    flex-direction:column;
    max-width:720px;
    margin:0 auto;
  }
  .qnum-badge{
    display:inline-flex;align-items:center;justify-content:center;
    width:22px;height:22px;border-radius:50%;
    background:var(--navy);color:#fff;
    font-size:11px;font-weight:700;
    margin-right:6px;flex-shrink:0;vertical-align:middle;
  }
  .qnum-check{ color:var(--teal);font-size:13px;font-weight:700;margin-left:4px; }
  .qblock-done{ border-left:3px solid var(--teal);padding-left:10px; }
  @media(max-width:700px){
    #app{ max-width:100%; }
  }

  /* ===== PAGE HEADER BANNER ===== */
  .page-header{
    position:relative;
    width:100%;
    height:160px;
    overflow:hidden;
    margin-bottom:24px;
    border-radius:0 0 18px 18px;
    box-shadow:0 4px 18px rgba(27,58,92,.18);
  }
  .page-header > svg{
    position:absolute;inset:0;
    width:100%;height:100%;
  }
  .page-header-content{
    position:absolute;inset:0;
    display:flex;flex-direction:column;justify-content:center;
    padding:0 28px;
    z-index:2;
  }
  .page-header-content .badge{margin-bottom:6px;}
  .page-header-content h1.title{
    color:#fff;margin:0;font-size:26px;
    text-shadow:0 2px 10px rgba(0,0,0,.5);
  }
  .page-header-content p.header-sub{
    color:rgba(255,255,255,.88);font-size:13px;margin:4px 0 0;
    text-shadow:0 1px 4px rgba(0,0,0,.4);
  }

  .page-body{padding:0 18px;}

  .badge{
    display:inline-block;
    background:var(--navy);
    color:#fff;
    font-family:'Oswald',sans-serif;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    padding:5px 10px;
    border-radius:3px;
    margin-bottom:10px;
  }
  .badge.teal{background:var(--teal);color:#fff;}
  .badge.amber{background:var(--teal);color:#fff;}

  .card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:12px;
    padding:24px;
    box-shadow:0 2px 12px rgba(27,58,92,.08), 0 0 0 1px rgba(27,58,92,.03);
    position:relative;
    overflow:hidden;
  }
  .card::before{
    content:"";
    position:absolute;
    top:0;left:0;
    width:4px;height:100%;
    background:linear-gradient(180deg, var(--teal) 0%, var(--navy) 100%);
    opacity:.55;
    border-radius:12px 0 0 12px;
  }
  .card + .card{margin-top:16px;}

  h1.title{font-size:26px;margin:6px 0 4px;color:var(--navy);}
  p.lede{color:var(--muted);font-size:15px;line-height:1.55;margin:0 0 18px;}

  label.field-label{
    display:block;font-size:12px;font-weight:600;letter-spacing:.04em;
    text-transform:uppercase;color:var(--navy-2);margin:18px 0 6px;
  }
  input[type=text]{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:6px;
    font-size:15px;font-family:inherit;background:#F5FAFC;
  }
  input[type=text]:focus{outline:2px solid var(--teal);border-color:var(--teal);}

  select.select-field{
    width:100%;padding:11px 12px;border:1px solid var(--line);border-radius:6px;
    font-size:15px;font-family:inherit;background:#F5FAFC;color:var(--ink);appearance:none;
  }
  select.select-field:focus{outline:2px solid var(--teal);border-color:var(--teal);}

  .quote-title{
    font-family:'Oswald',sans-serif;font-weight:600;font-size:14.5px;letter-spacing:.02em;
    color:var(--navy);background:var(--teal-light);border-left:4px solid var(--teal);
    padding:12px 14px;border-radius:4px;margin:0 0 14px;text-transform:uppercase;
  }
  .signoff{font-size:14px;color:var(--ink);line-height:1.6;margin:14px 0 22px;}
  .poin-list{margin:0 0 4px;padding-left:20px;font-size:14.5px;line-height:1.6;color:var(--ink);}
  .poin-list li{margin-bottom:6px;}
  table.scale-guide{width:100%;border-collapse:collapse;margin:6px 0 22px;font-size:14px;}
  table.scale-guide td{padding:7px 10px;border-bottom:1px solid var(--line);}
  table.scale-guide td:first-child{font-weight:700;color:var(--teal-dark);width:70px;}

  .radio-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px;}
  @media (max-width:520px){.radio-grid{grid-template-columns:1fr;}}
  .radio-opt{
    border:1px solid var(--line);border-radius:8px;padding:12px 14px;cursor:pointer;
    display:flex;gap:10px;align-items:flex-start;background:#F5FAFC;transition:.15s;
  }
  .radio-opt:hover{border-color:var(--teal);}
  .radio-opt.selected{border-color:var(--teal-dark);background:var(--teal-light);box-shadow:0 0 0 1px var(--teal-dark) inset;}
  .radio-opt input{margin-top:3px;accent-color:var(--teal);}
  .radio-opt .ro-title{font-weight:600;font-size:15px;color:var(--navy);}
  .radio-opt .ro-desc{font-size:13px;color:var(--muted);margin-top:2px;line-height:1.4;}

  button{
    font-family:'Inter',sans-serif;cursor:pointer;border:none;
  }
  .btn-primary{
    background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
    color:#fff;font-weight:600;font-size:15px;
    padding:13px 22px;border-radius:8px;width:100%;margin-top:22px;transition:.15s;
    box-shadow:0 2px 8px rgba(27,58,92,.25);
  }
  .btn-primary:disabled{background:#B0C4D4;cursor:not-allowed;box-shadow:none;}
  .btn-primary:not(:disabled):hover{background:linear-gradient(135deg,var(--teal-dark) 0%,var(--teal) 100%);box-shadow:0 4px 14px rgba(26,158,143,.35);}

  .btn-row{display:flex;gap:10px;margin-top:22px;}
  .btn-secondary{
    background:#fff;border:1.5px solid var(--line);color:var(--navy);
    font-weight:600;font-size:14px;padding:13px 18px;border-radius:8px;
  }
  .btn-secondary:hover{border-color:var(--navy);background:#F0F6FB;}
  .btn-secondary:disabled{color:#B0C4D4;cursor:not-allowed;}

  .btn-link{background:none;color:var(--muted);font-size:13px;text-decoration:underline;padding:4px;}
  .btn-link:hover{color:var(--navy);}

  /* road progress */
  .road-wrap{margin-bottom:22px;}
  .road-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600;}
  .road{
    position:relative;height:10px;background:var(--navy);border-radius:5px;overflow:hidden;
  }
  .road::before{
    content:"";position:absolute;top:50%;left:0;right:0;height:2px;transform:translateY(-1px);
    background:repeating-linear-gradient(90deg,rgba(255,255,255,.4) 0 8px,transparent 8px 16px);
  }
  .road-fill{
    position:absolute;top:0;left:0;height:100%;
    background:linear-gradient(90deg,var(--teal) 0%,#34D1C0 100%);
    border-radius:5px;transition:width .25s ease;
  }

  .section-tag{font-size:12px;color:var(--teal-dark);font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-bottom:6px;}
  .goal-context{font-size:12.5px;color:var(--muted);background:var(--teal-light);border-radius:6px;padding:8px 10px;margin-bottom:18px;}

  .pair-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:18px;}
  .pair-label{flex:1;font-size:15.5px;font-weight:600;line-height:1.35;}
  .pair-label.left{text-align:left;color:var(--navy);}
  .pair-label.right{text-align:right;color:var(--navy);}

  .qblock{margin-bottom:6px;}
  .qblock-num{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px;}
  .qdivider{height:1px;background:var(--line);margin:20px 0;}

  .scale-wrap{padding:6px 0 10px;}
  .scale-row{display:grid;grid-template-columns:repeat(17,1fr);gap:clamp(2px,0.6vw,5px);width:100%;}
  .scale-btn{
    width:100%;aspect-ratio:1/1;border-radius:50%;border:1.5px solid var(--line);
    background:#fff;font-weight:600;font-size:clamp(8px,1.8vw,13px);color:var(--navy);
    display:flex;align-items:center;justify-content:center;transition:.12s;
    padding:0;cursor:pointer;touch-action:manipulation;
  }
  .scale-btn:hover{border-color:var(--teal);color:var(--teal);}
  .scale-btn.center{border-color:var(--navy-2);background:#EEF4F7;}
  .scale-btn.selected{background:linear-gradient(135deg,var(--teal-dark),var(--teal));border-color:var(--teal);color:#fff;transform:scale(1.12);box-shadow:0 2px 8px rgba(26,158,143,.35);}
  .scale-caption{display:flex;justify-content:space-between;font-size:clamp(9px,1.4vw,11px);color:var(--muted);margin-top:4px;padding:0 2px;}

  .helper{font-size:12.5px;color:var(--muted);text-align:center;margin-top:2px;}

  .admin-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);font-size:14px;}
  .admin-row:last-child{border-bottom:none;}
  .pill{background:var(--teal);color:#fff;font-size:12px;padding:3px 9px;border-radius:99px;font-weight:600;}

  .footer-link{text-align:center;margin-top:26px;}
  .toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:var(--navy);color:#fff;padding:10px 18px;border-radius:8px;
    font-size:13.5px;box-shadow:0 4px 14px rgba(0,0,0,.25);z-index:50;
    border-left:3px solid var(--teal);
  }
  @media (max-width:700px){
    #app{max-width:100%;}
  }
  @media (max-width:480px){
    .pair-label{font-size:14px;}
    h1.title{font-size:22px;}
    .page-header{height:130px;}
    .page-header-content{padding:0 16px;}
    .page-header-content h1.title{font-size:20px;}
    .page-body{padding:0 12px;}
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ============================ DATA ============================ */
const STAKEHOLDERS = {
  pengguna: {
    label: "Pengguna Jalan",
    mainGoal: "Meningkatkan pengalaman perjalanan saat berkendara",

    ]
  },
  pemerintah: {
    label: "Pemerintah",
    mainGoal: "Menjamin keberlanjutan fungsi jalan secara efisien dan sesuai regulasi",
    desc: "Berfokus pada kondisi infrastruktur, ketepatan prioritas, efisiensi anggaran, dan kepatuhan regulasi dalam pemeliharaan jalan.",

      poin: [
        "Menjaga kondisi dan kinerja infrastruktur jalan",

  akademisi: {

    },
    tujuan: [
      { name: "Dasar Pengambilan Keputusan Berbasis Data", kriteria: [

// Isi dengan URL Web App Google Apps Script Anda (lihat panduan setup yang
// diberikan terpisah). Jika dikosongkan, fitur ini otomatis dilewati dan
// jawaban tetap aman tersimpan sebagai cadangan lokal di perangkat responden.
// ⬇ Ganti dengan URL Web App dari Google Apps Script Anda setelah deploy
// Google Sheet target: https://docs.google.com/spreadsheets/d/1wo7BX3nHMUwCRGBLhLDW5aKv20r727d-ENJHw0HO2C0/edit
const SHEET_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyBdnHUe7Rtb5I2GY5X9j-5ULee7n21BaFZkGL-zEgrNUi0jDlQHqNhdxSkVESu7C87uQ/exec";

const LETTERS = "ABCDEF";

function buildQuestions(stKey){
  const st = STAKEHOLDERS[stKey];
  const qs = [];
  for(let i=0;i<st.tujuan.length;i++){
    for(let j=i+1;j<st.tujuan.length;j++){
      qs.push({
        type:"goal",
        section:"Perbandingan Antar Tujuan (Cluster)",
        context:"Dibandingkan terhadap tujuan utama: \"" + st.mainGoal + "\"",
        left: st.tujuan[i].name,
        right: st.tujuan[j].name,
        header: "[TUJUAN] " + st.tujuan[i].name + " vs " + st.tujuan[j].name
      });
    }
  }
  st.tujuan.forEach((t, ti)=>{
    for(let i=0;i<t.kriteria.length;i++){
      for(let j=i+1;j<t.kriteria.length;j++){
        qs.push({
          type:"criteria",
          section:"Tujuan " + LETTERS[ti] + ": " + t.name,
          context:"Seberapa penting kriteria berikut dalam mendukung tujuan \"" + t.name + "\"?",
          left: t.kriteria[i],
          right: t.kriteria[j],
          header: "[" + LETTERS[ti] + "] " + t.name + ": " + t.kriteria[i] + " vs " + t.kriteria[j]
        });
      }
    }
  });
  return qs;
}

/* ============================ HELPERS ============================ */
function escCsv(val){
  const s = String(val);
  if(/[",\n]/.test(s)) return '"' + s.replace(/"/g,'""') + '"';
  return s;
}

function valueToMatrix(ans){
  if(!ans) return "";
  if(ans.side === "E") return "1";
  if(ans.side === "L") return String(ans.value);
  return (1/ans.value).toFixed(6);
}

// Timestamp lokal WIB (Asia/Jakarta), bukan UTC — supaya jam yang tercatat
// di spreadsheet sama dengan jam saat responden benar-benar mengisi.
function nowJakartaString(){
  const d = new Date();
  const datePart = d.toLocaleDateString('en-CA', {timeZone:'Asia/Jakarta'}); // YYYY-MM-DD
  const timePart = d.toLocaleTimeString('en-GB', {timeZone:'Asia/Jakarta', hour12:false}); // HH:mm:ss
  return datePart + ' ' + timePart + ' WIB';
}

function buildPayload(){
  const id = "anp_resp:" + Date.now() + "_" + Math.random().toString(36).slice(2,8);
  return {
    id, stakeholder: state.stKey, stakeholderLabel: STAKEHOLDERS[state.stKey].label,
    nama: state.nama, identity: Object.assign({}, state.identity),
    tanggal: nowJakartaString(),
    answers: state.answers
  };
}

// Same matrix value as valueToMatrix(), but returned as a real JS number
// (not a text string). This matters specifically for the Google Sheet
// integration: a JSON number is parsed locale-independently by Apps
// Script, whereas a text string like "0.111111" gets re-interpreted by
// Sheets using the spreadsheet's own locale (e.g. Indonesian locale reads
// "." as a thousands separator instead of a decimal point, corrupting the
// value). The CSV download keeps using the text version since that file
// is meant to be read directly, not auto-parsed by a spreadsheet locale.
function valueToNumber(ans){
  if(!ans) return "";
  if(ans.side === "E") return 1;
  if(ans.side === "L") return ans.value;
  return 1 / ans.value;
}

// Builds a "vertical" column payload (one respondent = one new column) for the
// Google Sheet integration.
// Format di sheet:
//   Kolom A  = label baris (Pertanyaan / info identitas)
//   Kolom B  = Responden 1, Kolom C = Responden 2, dst.
// Setiap pengiriman membawa:
//   - rowLabels : array label baris (kolom A), dikirim agar Apps Script bisa
//                 mencocokkan / membuat baris jika belum ada
//   - columnData: array nilai untuk kolom responden baru (sesuai urutan rowLabels)
//   - mode      : "vertical" — sinyal ke Apps Script agar tahu format ini
function buildSheetPayload(payload){
  const idFields = IDENTITY_FIELDS[payload.stakeholder] || [];
  const qs = buildQuestions(payload.stakeholder);

  // Susun label baris: info identitas dulu, lalu tiap pertanyaan
  const rowLabels = ["Tanggal", "Nama"]
    .concat(idFields.map(f => f.label))
    .concat(qs.map(q => q.header));

  // Susun nilai kolom responden ini (urutan sama dengan rowLabels)
  const columnData = [payload.tanggal, payload.nama]
    .concat(idFields.map(f => (payload.identity && payload.identity[f.key]) || ""))
    .concat(qs.map((q, idx) => valueToNumber(payload.answers[idx])));

  return {
    sheetName: payload.stakeholderLabel,
    mode: "vertical",
    rowLabels,
    columnData
  };
}

// Best-effort delivery straight into a Google Sheet (in the researcher's own
// Google Drive) via a Google Apps Script Web App. Requires SHEET_WEBAPP_URL
// to be configured above. Uses mode:"no-cors" because Apps Script Web Apps
// don't return CORS headers, so the response itself cannot be read back —
// but the request still reaches and executes on the server.
async function trySendToSheet(payload){
  if(!SHEET_WEBAPP_URL) return false;
  try{
    const sheetPayload = buildSheetPayload(payload);
    await fetch(SHEET_WEBAPP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify(sheetPayload)
    });
    return true;
  }catch(e){
    return false;
  }
}

async function loadAdminData(){
  setState({adminLoading:true});
  const summary = {};
  Object.keys(STAKEHOLDERS).forEach(k=> summary[k] = {count:0, items:[]});
  try{
    const listRes = await window.storage.list("anp_resp:", true);
    const keys = (listRes && listRes.keys) ? listRes.keys : [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value){
          const obj = JSON.parse(r.value);
          if(summary[obj.stakeholder]){
            summary[obj.stakeholder].count++;
            summary[obj.stakeholder].items.push(obj);
          }
        }
      }catch(e){ /* skip broken key */ }
    }
  }catch(e){ /* listing failed, leave empty */ }
  setState({adminData: summary, adminLoading:false});
}

function buildCsv(stKey, items){
  const qs = buildQuestions(stKey);
  const idFields = IDENTITY_FIELDS[stKey] || [];
  const colHeader = items.map(it => it.nama || it.id);
  const rows = [];
  rows.push(["Keterangan"].concat(colHeader));
  rows.push(["ID"].concat(items.map(it=>it.id)));
  rows.push(["Nama"].concat(items.map(it=>it.nama)));
  idFields.forEach(f=>{
    rows.push([f.label].concat(items.map(it=> (it.identity && it.identity[f.key]) || "")));
  });
  rows.push(["Tanggal"].concat(items.map(it=>it.tanggal)));
  let lastSection = null;
  qs.forEach((q, idx)=>{
    if(q.section !== lastSection){
      rows.push(["== " + q.section + " =="].concat(items.map(()=>"")));
      lastSection = q.section;
    }
    rows.push([q.left + "  vs  " + q.right].concat(items.map(it=> valueToMatrix(it.answers[idx]))));
  });
  return rows.map(r => r.map(escCsv).join(",")).join("\n");
}

function triggerDownload(filename, csv){
  const blob = new Blob(["\uFEFF" + csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function downloadCsv(stKey, items){
  triggerDownload("anp_" + stKey + "_" + Date.now() + ".csv", buildCsv(stKey, items));
}

function downloadSingleCsv(payload){
  const safeName = (payload.nama||"responden").trim().toLowerCase().replace(/[^a-z0-9]+/g,"_").slice(0,30) || "responden";
  triggerDownload("anp_" + payload.stakeholder + "_" + safeName + "_" + Date.now() + ".csv", buildCsv(payload.stakeholder, [payload]));
}

function pageHeader(badge, badgeClass, title, sub){
  const svg = BANNER_SVGS[_bannerIdx % BANNER_SVGS.length];
  _bannerIdx++;
  const bc = badgeClass ? ' '+badgeClass : '';
  const subHtml = sub ? '<p class="header-sub">'+sub+'</p>' : '';
  return '<div class="page-header">' +
    svg +
    '<div class="page-header-content">' +
      '<span class="badge'+bc+'">'+badge+'</span>' +
      '<h1 class="title">'+title+'</h1>' +
      subHtml +
    '</div>' +
  '</div>' +
  '<div class="page-body">';
}
function pageEnd(){ return '</div>'; }

/* ============================ RENDER: START (identitas) ============================ */
function renderStart(){
  const opts = Object.entries(STAKEHOLDERS).map(([key, st])=>{
    const sel = state.stKey === key;
    return '<div class="radio-opt' + (sel?' selected':'') + '" data-key="'+key+'" onclick="selectStakeholder(\''+key+'\')">' +
      '<input type="radio" name="stakeholder" '+(sel?'checked':'')+' readonly>' +
      '<div><div class="ro-title">'+st.label+'</div><div class="ro-desc">'+st.desc+'</div></div>' +
      '</div>';
  }).join("");

  const idFields = state.stKey ? (IDENTITY_FIELDS[state.stKey]||[]) : [];
  const idFieldsHtml = idFields.map(f=>{
    const val = state.identity[f.key] || "";
    if(f.type === "select"){
      const optsHtml = '<option value="">Pilih ' + f.label.toLowerCase() + '</option>' +
        f.options.map(o=>'<option value="'+escapeHtml(o)+'" '+(val===o?'selected':'')+'>'+escapeHtml(o)+'</option>').join("");
      return '<label class="field-label">'+f.label+'</label>' +
        '<select class="select-field" onchange="updateIdentity(\''+f.key+'\', this.value)">'+optsHtml+'</select>';
    }
    return '<label class="field-label">'+f.label+'</label>' +
      '<input type="text" value="'+escapeHtml(val)+'" placeholder="Isi '+f.label.toLowerCase()+'" oninput="updateIdentity(\''+f.key+'\', this.value)">';
  }).join("");

  return '' +
  pageHeader('Kuesioner ANP · Pemeliharaan Jalan','','Data Responden','Lengkapi data diri sebelum mulai mengisi kuesioner') +
  '<div class="card">' +
    '<label class="field-label">Anda Mengisi Kuesioner Sebagai</label>' +
    '<div class="radio-grid">'+opts+'</div>' +
    '<label class="field-label" style="margin-top:18px">Nama Lengkap</label>' +
    '<input type="text" id="inpNama" value="'+escapeHtml(state.nama)+'" placeholder="Masukkan nama Anda" oninput="updateField(\'nama\', this.value)">' +
    idFieldsHtml +
    '<button class="btn-primary" id="btnStart" onclick="goBriefing()" disabled>Lanjut</button>' +
  '</div>' +
  '<div class="footer-link"><button class="btn-link" onclick="goAdmin()">Mode Admin — lihat &amp; unduh data responden</button></div>' + pageEnd();
}

function escapeHtml(s){
  return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

window.selectStakeholder = function(key){
  setState({stKey:key, identity:{}});
  checkStartEnabled();
};
window.updateField = function(field, val){
  state[field] = val; // avoid full re-render to keep input focus
  checkStartEnabled();
};
window.updateIdentity = function(key, val){
  state.identity[key] = val;
  checkStartEnabled();
};
function checkStartEnabled(){
  const btn = document.getElementById("btnStart");
  if(!btn) return;
  const idFields = state.stKey ? (IDENTITY_FIELDS[state.stKey]||[]) : [];
  const idFilled = idFields.every(f => state.identity[f.key] && String(state.identity[f.key]).trim().length>0);
  btn.disabled = !(state.stKey && state.nama.trim().length>0 && idFilled);
}

window.goBriefing = function(){
  setState({view:"briefing"});
};

  '<div class="card">' +
    '<div class="section-tag">Panduan Pengisian Kuesioner</div>' +
    '<p class="lede" style="margin-bottom:10px">Kuesioner ini menggunakan skala perbandingan berpasangan (1&ndash;9) untuk menilai tingkat kepentingan antar kriteria.</p>' +
    '<table class="scale-guide">' +
      '<tr><td>1</td><td>Sama penting</td></tr>' +
      '<tr><td>3</td><td>Sedikit lebih penting</td></tr>' +
      '<tr><td>5</td><td>Lebih penting</td></tr>' +
      '<tr><td>7</td><td>Sangat lebih penting</td></tr>' +
      '<tr><td>9</td><td>Mutlak lebih penting</td></tr>' +
      '<tr><td>2, 4, 6, 8</td><td>Nilai tengah antara dua penilaian di atas</td></tr>' +
    '</table>' +
    '<button class="btn-primary" onclick="startSurvey()">Mulai Menjawab Pertanyaan</button>' +
  '</div>' + pageEnd();
}

window.startSurvey = function(){
  const qs = buildQuestions(state.stKey);
  setState({
    view:"survey",
    questions: qs,
    answers: new Array(qs.length).fill(null),
    sections: buildSections(qs),
    sectionIndex: 0
  });
};

function buildSections(qs){
  const sections = [];
  let current = null;
  qs.forEach((q, i)=>{
    if(!current || current.section !== q.section){
      current = { section:q.section, context:q.context, indices:[] };
      sections.push(current);
    }
    current.indices.push(i);
  });
  return sections;
}

/* ============================ RENDER: SURVEY (section, many questions stacked) ============================ */
function renderSurvey(){
  const st = STAKEHOLDERS[state.stKey];
  const sections = state.sections;
  const sec = sections[state.sectionIndex];
  const totalSections = sections.length;
  const pct = Math.round((state.sectionIndex/totalSections)*100);
  const isLast = state.sectionIndex === totalSections-1;
  const allAnswered = sec.indices.every(qi=>state.answers[qi]);

  const leftVals = [9,8,7,6,5,4,3,2];
  const rightVals = [2,3,4,5,6,7,8,9];

  function scaleRowHtml(qi){
    const ans = state.answers[qi];
    function b(val, side){
      const isSel = ans && ans.side===side && ans.value===val;
      const cls = "scale-btn" + (isSel?" selected":"");
      return '<button class="'+cls+'" data-qi="'+qi+'" onclick="pickAnswer('+qi+','+val+',\''+side+'\',this)">'+val+'</button>';
    }
    let row = leftVals.map(v=>b(v,"L")).join("");
    row += '<button class="scale-btn center'+(ans && ans.side==="E" ? " selected":"")+'" data-qi="'+qi+'" onclick="pickAnswer('+qi+',1,\'E\',this)">1</button>';
    row += rightVals.map(v=>b(v,"R")).join("");
    return row;
  }

  // Buat semua blok pertanyaan
  const allQBlocks = sec.indices.map((qi, n)=>{
    const q   = state.questions[qi];
    const ans = state.answers[qi];
    const done = !!ans;
    return '' +
    '<div class="qblock'+(done?' qblock-done':'')+'" id="qblock-'+qi+'">' +
      '<div class="qblock-num">' +
        '<span class="qnum-badge">'+(n+1)+'</span>' +
        '<span style="font-size:11px;color:var(--muted)">dari '+sec.indices.length+'</span>' +
        (done?'<span class="qnum-check"> ✓</span>':'') +
      '</div>' +
      '<div class="pair-row">' +
        '<div class="pair-label left">'+q.left+'</div>' +
        '<div class="pair-label right">'+q.right+'</div>' +
      '</div>' +
      '<div class="scale-wrap"><div class="scale-row">'+scaleRowHtml(qi)+'</div></div>' +
      '<div class="scale-caption">' +
        '<span>&larr; '+truncate(q.left)+'</span>' +
        '<span>'+truncate(q.right)+' &rarr;</span>' +
      '</div>' +
    '</div>';
  });

  // Satu kolom, urut sesuai nomor pertanyaan aslinya (tidak diacak)
  const itemsHtml =
    '<div class="qlist">' +
      allQBlocks.join('<div class="qdivider"></div>') +
    '</div>';

  return pageHeader('Pertanyaan','teal',sec.section,'Bagian '+(state.sectionIndex+1)+' dari '+totalSections) +
  '<div class="road-wrap">' +
    '<div class="road-meta"><span>'+st.label+'</span><span>Bagian '+(state.sectionIndex+1)+' dari '+totalSections+'</span></div>' +
    '<div class="road"><div class="road-fill" style="width:'+pct+'%"></div></div>' +
  '</div>' +
  '<div class="card">' +
    '<div class="section-tag">'+sec.section+'</div>' +
    '<div class="goal-context">'+sec.context+'</div>' +
    '<p class="helper" style="margin:0 0 14px;text-align:left">Pilih angka 1 (sama penting) hingga 9 (mutlak lebih penting) ke arah kriteria yang lebih dominan, untuk setiap pasangan di bawah ini.</p>' +
    itemsHtml +
    '<div class="btn-row" id="navRow">' +
      '<button class="btn-secondary" onclick="prevSection()" '+(state.sectionIndex===0?'disabled':'')+' style="flex:1">Kembali</button>' +
      '<button class="btn-primary" id="btnNextSection" style="margin-top:0;flex:2" onclick="nextSection()" '+(!allAnswered?'disabled':'')+'>'+(isLast?'Selesai &amp; Tinjau':'Lanjut ke Bagian Berikutnya')+'</button>' +
    '</div>' +
  '</div>' + pageEnd();
}

function truncate(s){ return s.length>34 ? s.slice(0,32)+"…" : s; }

window.pickAnswer = function(qi, val, side, btnEl){
  state.answers[qi] = {value:val, side:side};
  const block = document.getElementById("qblock-"+qi);
  if(block){
    block.querySelectorAll(".scale-btn").forEach(b=>b.classList.remove("selected"));
    if(btnEl) btnEl.classList.add("selected");
  }
  const sec = state.sections[state.sectionIndex];
  const allAnswered = sec.indices.every(idx=>state.answers[idx]);
  const nextBtn = document.getElementById("btnNextSection");
  if(nextBtn) nextBtn.disabled = !allAnswered;
};
window.nextSection = function(){
  if(state.sectionIndex < state.sections.length-1){
    setState({sectionIndex: state.sectionIndex+1});
    window.scrollTo(0,0);
  } else {
    setState({view:"review"});
  }
};
window.prevSection = function(){
  if(state.sectionIndex>0){
    setState({sectionIndex: state.sectionIndex-1});
    window.scrollTo(0,0);
  }
};

/* ============================ RENDER: REVIEW ============================ */
function renderReview(){
  const st = STAKEHOLDERS[state.stKey];
  const answered = state.answers.filter(a=>a).length;
  const idFields = IDENTITY_FIELDS[state.stKey] || [];
  const idRows = idFields.map(f=>
    '<div class="admin-row"><span>'+f.label+'</span><strong>'+escapeHtml(state.identity[f.key]||"")+'</strong></div>'
  ).join("");
  return pageHeader('Tinjau Sebelum Kirim','teal','Konfirmasi Jawaban','Periksa kembali sebelum mengirimkan') +
  '<div class="card">' +
    '<div class="admin-row"><span>Nama</span><strong>'+escapeHtml(state.nama)+'</strong></div>' +
    idRows +
    '<div class="admin-row"><span>Kategori Responden</span><strong>'+st.label+'</strong></div>' +
    '<div class="admin-row"><span>Pertanyaan Terjawab</span><strong>'+answered+' / '+state.questions.length+'</strong></div>' +
    '<button class="btn-primary" onclick="submitSurvey()">Kirim Jawaban</button>' +
    '<button class="btn-secondary" style="width:100%;margin-top:10px" onclick="setState({view:\'survey\', sectionIndex: state.sections.length-1})">Periksa Kembali Jawaban</button>' +
  '</div>' + pageEnd();
}

window.submitSurvey = async function(){
  const payload = buildPayload();
  const sheetOk = await trySendToSheet(payload);
  // Tampilkan halaman "Terima Kasih" dulu. Unduh CSV otomatis TIDAK lagi
  // dijalankan di sini — di sejumlah browser HP (terutama Safari iOS),
  // trik unduh via blob+anchor ini malah membuka/menavigasi ke isi file
  // CSV-nya alih-alih benar-benar mengunduh, sehingga halaman "Terima Kasih"
  // tidak pernah terlihat. Jawaban tetap tersimpan lewat Google Sheet;
  // unduhan CSV kini murni opsional lewat tombol di halaman ini.
  setState({view:"done", lastSubmission: payload, storageWorked: sheetOk});
};

/* ============================ RENDER: DONE ============================ */
function renderDone(){
  return pageHeader('Selesai','','Terima Kasih','Jawaban Anda telah berhasil disimpan') +
  '<div class="card">' +
    '<p class="lede" style="margin-bottom:6px">Jawaban Bapak/Ibu/Saudara/i sebagai <strong>'+STAKEHOLDERS[state.stKey].label+'</strong> telah berhasil disimpan.</p>' +
    '<p class="lede" style="margin-bottom:18px">Kami mengucapkan terima kasih yang sebesar-besarnya atas waktu, tenaga, dan pikiran yang telah Bapak/Ibu/Saudara/i luangkan untuk mengisi kuesioner penelitian ini. Partisipasi Anda memberikan kontribusi yang sangat berarti bagi kelancaran dan keberhasilan penelitian ini.</p>' +
    '<p class="signoff" style="margin-top:0">Hormat kami,<br>' +
      '<strong>Shintya Amallia Indarwati, S.T.</strong><br>' +
      'Program Studi Magister Teknik Sipil<br>' +
      'Institut Teknologi Nasional (ITENAS) Bandung</p>' +
    '<button class="btn-primary" onclick="resetAll()">Isi Kuesioner untuk Responden Lain</button>' +
    '<div class="footer-link"><button class="btn-link" onclick="downloadSingleCsv(state.lastSubmission)">Unduh salinan jawaban saya (opsional)</button></div>' +
  '</div>' + pageEnd();
}

window.resetAll = function(){
  setState({view:"welcome", stKey:null, nama:"", identity:{}, questions:[], answers:[], sections:[], sectionIndex:0, lastSubmission:null, storageWorked:null});
};

/* ============================ RENDER: ADMIN ============================ */
window.goAdmin = function(){
  setState({view:"admin"});
  loadAdminData();
};

function renderAdmin(){
  let body;
  if(state.adminLoading || !state.adminData){
    body = '<p class="lede">Memuat data responden…</p>';
  } else {
    const rows = Object.entries(STAKEHOLDERS).map(([key, st])=>{
      const d = state.adminData[key];
      return '<div class="admin-row"><span>'+st.label+'</span>' +
        '<span style="display:flex;align-items:center;gap:10px">' +
          '<span class="pill">'+d.count+' responden</span>' +
          '<button class="btn-link" '+(d.count===0?'disabled':'')+' onclick="downloadCsv(\''+key+'\', state.adminData[\''+key+'\'].items)">Unduh CSV</button>' +
        '</span></div>';
    }).join("");
    body = '<div class="card">'+rows+'</div>';
  }
  return pageHeader('Mode Admin','teal','Rekap Responden','Data jawaban per kategori stakeholder') +
  '<p class="lede">Rekap di bawah hanya menampilkan jawaban yang tersimpan otomatis lewat penyimpanan Claude.ai. Jika kuesioner ini dibagikan sebagai file mandiri (dibuka langsung di browser, bukan lewat Claude.ai), data tidak akan muncul di sini — gunakan file CSV yang otomatis terunduh dari setiap responden, lalu gabungkan barisnya secara manual di Excel (header CSV-nya identik per kategori responden).</p>' +
  body +
  '<div class="footer-link"><button class="btn-link" onclick="goBackFromAdmin()">&larr; Kembali ke Halaman Awal</button></div>' +
  pageEnd();
}
window.downloadCsv = downloadCsv;
window.goBackFromAdmin = function(){ setState({view:"start"}); };

/* ============================ MAIN RENDER ============================ */
function render(){
  const app = document.getElementById("app");
  let html;
  if(state.view==="welcome") html = renderWelcome();
  else if(state.view==="start") html = renderStart();
  else if(state.view==="briefing") html = renderBriefing();
  else if(state.view==="survey") html = renderSurvey();
  else if(state.view==="review") html = renderReview();
  else if(state.view==="done") html = renderDone();
  else if(state.view==="admin") html = renderAdmin();
  if(state.toast) html += '<div class="toast">'+state.toast+'</div>';
  app.innerHTML = html;
  if(state.view==="start") checkStartEnabled();
}

render();
</script>
